# Nucleo-G474RE OpenOCD config
# Prefer native swd for newer ST-LINK/OpenOCD builds, but fall back to
# hla_swd for older or xPack builds that only expose the HLA transport.

source [find interface/stlink.cfg]

if {[catch {transport select swd}]} {
	transport select hla_swd
}

source [find target/stm32g4x.cfg]

reset_config srst_only
