# Minimal "hello ViewAlyzer" config for nucleo_g474re over ITM/SWO.

# LED blink driver
CONFIG_GPIO=y

# Pull in a libc that provides sinf() for the demo trace
CONFIG_NEWLIB_LIBC=y

# Zephyr kernel features ViewAlyzer relies on
CONFIG_MULTITHREADING=y
CONFIG_THREAD_NAME=y
CONFIG_THREAD_MONITOR=y
CONFIG_THREAD_STACK_INFO=y

# ViewAlyzer module + tracing user hook (both required)
CONFIG_VIEWALYZER=y
CONFIG_TRACING_USER=y

# Transport: ITM/SWO. Host SWV start rate must match this frequency.
CONFIG_VIEWALYZER_TRANSPORT_ITM=y
CONFIG_VIEWALYZER_TRANSPORT_RTT=n
CONFIG_LOG_BACKEND_SWO=y
CONFIG_LOG_BACKEND_SWO_FREQ_HZ=2000000
CONFIG_STM32_ENABLE_DEBUG_SLEEP_STOP=y
